<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EconomyConsumer">
<meta name="theme-color" content="#080c14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="AI-powered global business and economy intelligence. Live breaking news, markets, and analysis.">
<title>EconomyConsumer — World Business Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c14;--bg2:#0e1623;--bg3:#141e2e;--bg4:#1a2540;
  --card:#111827;--card2:#16202f;
  --ink:#f0ece4;--ink2:#b8b4ac;--ink3:#6e6a64;
  --gold:#c9a84c;--gold2:#e8c76a;
  --red:#e05555;--green:#3dba87;--blue:#4a9eff;
  --rule:rgba(255,255,255,0.07);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --tab-h:64px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

/* STATUS BAR */
#status-pad{height:var(--safe-top);background:var(--bg);position:fixed;top:0;left:0;right:0;z-index:100}

/* HEADER */
#hdr{position:fixed;top:var(--safe-top);left:0;right:0;z-index:90;background:rgba(8,12,20,0.94);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:0.5px solid var(--rule)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px}
.logo{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:900;color:var(--ink);letter-spacing:0.03em;line-height:1}
.logo em{color:var(--gold);font-style:normal}
.logo-sub{font-family:'DM Mono',monospace;font-size:0.48rem;letter-spacing:0.22em;color:var(--ink3);text-transform:uppercase;margin-top:3px}
.hdr-right{display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(61,186,135,0.1);border:0.5px solid rgba(61,186,135,0.25);border-radius:20px;padding:4px 9px}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.ltxt{font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.12em;color:var(--green)}
.rbtn{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--rule);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--ink2);transition:all 0.2s}
.rbtn:active{transform:scale(0.88);background:var(--bg4)}
.spinning{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MARKETS STRIP */
.mkt-strip{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;padding:6px 20px 10px;border-top:0.5px solid var(--rule)}
.mkt-strip::-webkit-scrollbar{display:none}
.mi{flex-shrink:0;padding-right:16px;margin-right:8px;border-right:0.5px solid var(--rule);display:flex;flex-direction:column;gap:1px}
.mi:last-child{border-right:none}
.mn{font-family:'DM Mono',monospace;font-size:0.48rem;letter-spacing:0.1em;color:var(--ink3);text-transform:uppercase}
.mv{font-family:'DM Mono',monospace;font-size:0.68rem;font-weight:500;color:var(--ink)}
.mc{font-family:'DM Mono',monospace;font-size:0.55rem}
.up{color:var(--green)}.dn{color:var(--red)}

/* CATEGORY TABS */
#ctabs{position:fixed;left:0;right:0;z-index:80;background:rgba(8,12,20,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--rule);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px}
#ctabs::-webkit-scrollbar{display:none}
.ct{flex-shrink:0;font-size:0.75rem;font-weight:500;padding:10px 10px;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.18s;white-space:nowrap}
.ct.on{color:var(--gold);border-bottom-color:var(--gold)}

/* MAIN SCROLL */
#feed-wrap{position:fixed;left:0;right:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* PULL-TO-REFRESH */
#ptr{height:52px;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:-52px;transition:margin-top 0.3s ease}
.ptr-spin{width:14px;height:14px;border:1.5px solid var(--ink3);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
.ptr-lbl{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;color:var(--ink3);text-transform:uppercase}

/* CARDS */
.section-row{display:flex;align-items:baseline;justify-content:space-between;padding:20px 16px 10px}
.section-ttl{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--ink)}
.section-cnt{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;color:var(--ink3);text-transform:uppercase}

/* HERO */
.hero{margin:14px 14px 0;background:var(--card);border-radius:18px;overflow:hidden;border:0.5px solid var(--rule);cursor:pointer;transition:transform 0.15s}
.hero:active{transform:scale(0.984)}
.hero-img-box{width:100%;height:185px;background:linear-gradient(145deg,var(--bg3),var(--bg4));display:flex;align-items:center;justify-content:center;position:relative}
.hero-img-txt{font-family:'Playfair Display',serif;font-size:5rem;font-weight:900;color:rgba(255,255,255,0.04);user-select:none}
.hero-img-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--card) 0%,rgba(0,0,0,0) 55%)}
.hero-body{padding:15px}
.hero-kicker{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px}
.hero-hl{font-family:'Playfair Display',serif;font-size:1.32rem;font-weight:700;line-height:1.18;color:var(--ink);margin-bottom:9px}
.hero-sum{font-size:0.83rem;line-height:1.65;color:var(--ink2);font-weight:300;margin-bottom:12px}
.hero-ft{display:flex;align-items:center;justify-content:space-between}
.hero-src{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.08em;color:var(--ink3);text-transform:uppercase}

/* URGENCY CHIPS */
.chip{font-family:'DM Mono',monospace;font-size:0.48rem;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.chip-b{background:rgba(224,85,85,0.12);color:var(--red);border:0.5px solid rgba(224,85,85,0.25)}
.chip-d{background:rgba(74,158,255,0.1);color:var(--blue);border:0.5px solid rgba(74,158,255,0.2)}
.chip-a{background:rgba(255,255,255,0.05);color:var(--ink3);border:0.5px solid var(--rule)}

/* BREAKING BANNER */
.brk{margin:12px 14px 0;background:rgba(224,85,85,0.08);border:0.5px solid rgba(224,85,85,0.22);border-radius:14px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.brk:active{opacity:0.8}
.brk-tag{font-family:'DM Mono',monospace;font-size:0.48rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--red);background:rgba(224,85,85,0.12);border-radius:4px;padding:3px 6px;white-space:nowrap;margin-top:2px;flex-shrink:0}
.brk-txt{font-size:0.83rem;line-height:1.45;color:var(--ink);font-weight:500}

/* HORIZONTAL SCROLL */
.hscroll{overflow-x:auto;scrollbar-width:none;display:flex;gap:10px;padding:0 14px 4px}
.hscroll::-webkit-scrollbar{display:none}
.hc{flex-shrink:0;width:220px;background:var(--card);border-radius:14px;padding:14px;border:0.5px solid var(--rule);cursor:pointer;transition:transform 0.15s}
.hc:active{transform:scale(0.97)}
.hc-cat{font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px}
.hc-hl{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;line-height:1.25;color:var(--ink);margin-bottom:8px}
.hc-src{font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.06em;color:var(--ink3);text-transform:uppercase}

/* LIST CARDS */
.story-list{display:flex;flex-direction:column;gap:8px;padding:0 14px}
.sc{background:var(--card);border-radius:14px;padding:14px 14px 12px 17px;border:0.5px solid var(--rule);cursor:pointer;transition:transform 0.15s;position:relative;overflow:hidden}
.sc:active{transform:scale(0.982)}
.sc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.sc.markets::before{background:var(--gold)}
.sc.world::before{background:var(--blue)}
.sc.technology::before{background:var(--green)}
.sc.politics::before{background:var(--red)}
.sc.energy::before{background:#a78bfa}
.sc.business::before{background:#fb923c}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:7px}
.sc-hl{font-family:'Playfair Display',serif;font-size:0.98rem;font-weight:700;line-height:1.28;color:var(--ink);flex:1}
.sc-sum{font-size:0.78rem;line-height:1.6;color:var(--ink2);font-weight:300;margin-bottom:9px}
.sc-ft{display:flex;align-items:center;gap:7px}
.sc-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sc-src{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.06em;color:var(--ink3);text-transform:uppercase}
.sc-ago{font-family:'DM Mono',monospace;font-size:0.52rem;color:var(--ink3);margin-left:auto}

/* MARKETS GRID */
.mkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px}
.mg-card{background:var(--card);border-radius:14px;padding:14px;border:0.5px solid var(--rule)}
.mg-name{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;color:var(--ink3);text-transform:uppercase;margin-bottom:6px}
.mg-val{font-family:'DM Mono',monospace;font-size:1.05rem;font-weight:500;color:var(--ink);margin-bottom:3px}
.mg-chg{font-family:'DM Mono',monospace;font-size:0.68rem}

/* BOTTOM TAB */
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:90;background:rgba(8,12,20,0.96);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-top:0.5px solid var(--rule);display:flex;padding-bottom:var(--safe-bot);height:calc(var(--tab-h) + var(--safe-bot))}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:8px 0;transition:opacity 0.15s}
.tb:active{opacity:0.55}
.tb-ico{font-size:20px;line-height:1;transition:transform 0.18s}
.tb.on .tb-ico{transform:scale(1.12)}
.tb-lbl{font-size:0.58rem;font-weight:500;color:var(--ink3);transition:color 0.15s;letter-spacing:0.02em}
.tb.on .tb-lbl{color:var(--gold)}
.tb-pip{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0;transition:opacity 0.18s;margin-top:-1px}
.tb.on .tb-pip{opacity:1}

/* LOADING */
#loader{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s;padding:var(--safe-top) 0 var(--safe-bot)}
#loader.gone{opacity:0;pointer-events:none}
.ll{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;color:var(--ink);letter-spacing:0.04em;animation:fu 0.5s ease both}
.ll em{color:var(--gold);font-style:normal}
.lt{font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.25em;color:var(--ink3);text-transform:uppercase;margin:6px 0 36px;animation:fu 0.5s 0.1s ease both}
.lbar{width:180px;height:1.5px;background:var(--bg4);border-radius:1px;overflow:hidden;margin-bottom:14px}
.lfill{height:100%;background:var(--gold);width:0%;transition:width 0.4s ease;border-radius:1px}
.lst{font-family:'DM Mono',monospace;font-size:0.56rem;letter-spacing:0.08em;color:var(--ink3);animation:fu 0.5s 0.2s ease both;text-align:center}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* SKELETON */
.sk{background:var(--bg3);border-radius:5px;animation:sk 1.6s ease-in-out infinite}
@keyframes sk{0%,100%{opacity:0.3}55%{opacity:0.7}}
.sk1{height:1.2rem;width:88%;margin-bottom:7px}
.sk2{height:0.9rem;width:65%;margin-bottom:10px}
.sk3{height:0.75rem;width:100%;margin-bottom:5px}
.sk4{height:0.75rem;width:75%}

/* TOAST */
#toast{position:fixed;z-index:500;left:50%;transform:translateX(-50%) translateY(10px);bottom:calc(var(--tab-h) + var(--safe-bot) + 12px);background:var(--bg4);border:0.5px solid var(--rule);border-radius:20px;padding:9px 18px;font-size:0.78rem;color:var(--ink);opacity:0;transition:all 0.25s;white-space:nowrap;pointer-events:none;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SHEET */
.sheet-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sheet-box{position:fixed;bottom:0;left:0;right:0;z-index:401;background:#111827;border-radius:22px 22px 0 0;padding-bottom:calc(var(--safe-bot) + 16px);max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1)}
.sheet-box.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;margin:12px auto 0}
.sheet-body{padding:20px}
.sheet-kicker{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:12px}
.sheet-hl{font-family:'Playfair Display',serif;font-size:1.42rem;font-weight:700;line-height:1.18;color:var(--ink);margin-bottom:14px}
.sheet-sum{font-size:0.92rem;line-height:1.72;color:var(--ink2);font-weight:300;margin-bottom:18px}
.sheet-src{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.08em;color:var(--ink3);text-transform:uppercase;margin-bottom:20px}
.sheet-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sheet-btn{text-align:center;padding:13px;border-radius:13px;font-size:0.84rem;cursor:pointer;transition:opacity 0.15s}
.sheet-btn:active{opacity:0.7}
.sbtn-save{background:rgba(201,168,76,0.12);border:0.5px solid rgba(201,168,76,0.3);color:var(--gold)}
.sbtn-close{background:rgba(255,255,255,0.05);border:0.5px solid var(--rule);color:var(--ink2)}

/* SEARCH */
.search-box{margin:14px;background:var(--card);border:0.5px solid var(--rule);border-radius:14px;display:flex;align-items:center;gap:10px;padding:12px 14px}
.search-ico{font-size:16px;color:var(--ink3)}
#sinput{flex:1;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--ink)}
#sinput::placeholder{color:var(--ink3)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px}
.ei{font-size:2.2rem;opacity:0.25}
.et{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;color:var(--ink3);text-transform:uppercase;text-align:center}

/* FOOTER */
.feed-footer{padding:20px;display:flex;align-items:center;justify-content:center;gap:8px;border-top:0.5px solid var(--rule);margin-top:10px}
.ff-txt{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.08em;color:var(--ink3);text-transform:uppercase}
.ff-time{font-family:'DM Mono',monospace;font-size:0.68rem;font-weight:500;color:var(--gold)}

@media(min-width:680px){
  #hdr,#ctabs,#feed-wrap,#tabbar,#loader,#status-pad{max-width:440px;left:50%;transform:translateX(-50%)}
  #toast{max-width:400px}
}
</style>
</head>
<body>

<div id="status-pad"></div>
<div id="loader">
  <div class="ll">Economy<em>Consumer</em></div>
  <div class="lt">World Business Intelligence</div>
  <div class="lbar"><div class="lfill" id="lfill"></div></div>
  <div class="lst" id="lst">Initializing...</div>
</div>
<div id="toast"></div>

<header id="hdr">
  <div class="hdr-top">
    <div>
      <div class="logo">Economy<em>Consumer</em></div>
      <div class="logo-sub">AI · Global Intelligence · Live</div>
    </div>
    <div class="hdr-right">
      <div class="live-badge"><div class="ldot"></div><div class="ltxt">Live</div></div>
      <div class="rbtn" id="rbtn" onclick="doRefresh()">↻</div>
    </div>
  </div>
  <div class="mkt-strip">
    <div class="mi"><div class="mn">DOW</div><div class="mv" id="v-dow">—</div><div class="mc" id="c-dow">—</div></div>
    <div class="mi"><div class="mn">S&amp;P</div><div class="mv" id="v-sp">—</div><div class="mc" id="c-sp">—</div></div>
    <div class="mi"><div class="mn">NASDAQ</div><div class="mv" id="v-nq">—</div><div class="mc" id="c-nq">—</div></div>
    <div class="mi"><div class="mn">FTSE</div><div class="mv" id="v-ftse">—</div><div class="mc" id="c-ftse">—</div></div>
    <div class="mi"><div class="mn">GOLD</div><div class="mv" id="v-gold">—</div><div class="mc" id="c-gold">—</div></div>
    <div class="mi"><div class="mn">OIL</div><div class="mv" id="v-oil">—</div><div class="mc" id="c-oil">—</div></div>
    <div class="mi"><div class="mn">BTC</div><div class="mv" id="v-btc">—</div><div class="mc" id="c-btc">—</div></div>
    <div class="mi"><div class="mn">EUR/USD</div><div class="mv" id="v-eur">—</div><div class="mc" id="c-eur">—</div></div>
  </div>
</header>

<div id="ctabs">
  <div class="ct on" data-c="all">For You</div>
  <div class="ct" data-c="markets">Markets</div>
  <div class="ct" data-c="world">World</div>
  <div class="ct" data-c="technology">Tech</div>
  <div class="ct" data-c="politics">Politics</div>
  <div class="ct" data-c="energy">Energy</div>
  <div class="ct" data-c="business">Business</div>
</div>

<div id="feed-wrap">
  <div id="ptr"><div class="ptr-spin"></div><div class="ptr-lbl">Refreshing</div></div>
  <div id="feed"></div>
</div>

<nav id="tabbar">
  <div class="tb on" data-t="feed" onclick="switchTab('feed')"><div class="tb-ico">⚡</div><div class="tb-lbl">Feed</div><div class="tb-pip"></div></div>
  <div class="tb" data-t="markets" onclick="switchTab('markets')"><div class="tb-ico">📈</div><div class="tb-lbl">Markets</div><div class="tb-pip"></div></div>
  <div class="tb" data-t="search" onclick="switchTab('search')"><div class="tb-ico">🔍</div><div class="tb-lbl">Search</div><div class="tb-pip"></div></div>
  <div class="tb" data-t="saved" onclick="switchTab('saved')"><div class="tb-ico">🔖</div><div class="tb-lbl">Saved</div><div class="tb-pip"></div></div>
</nav>

<script>
const CATS=[
  {id:'markets',   label:'Markets & Finance',  color:'#c9a84c'},
  {id:'world',     label:'World News',          color:'#4a9eff'},
  {id:'technology',label:'Technology',          color:'#3dba87'},
  {id:'politics',  label:'Politics & Policy',  color:'#e05555'},
  {id:'energy',    label:'Energy & Climate',   color:'#a78bfa'},
  {id:'business',  label:'Business & Economy', color:'#fb923c'},
];
let news={}, curCat='all', curTab='feed', cdSecs=3600, cdTimer;
let saved=JSON.parse(localStorage.getItem('ec_saved')||'[]');

/* ── LAYOUT ── */
function layout(){
  const hdr=document.getElementById('hdr');
  const ct=document.getElementById('ctabs');
  const fw=document.getElementById('feed-wrap');
  const tb=document.getElementById('tabbar');
  const hh=hdr.offsetHeight;
  const cth=ct.offsetHeight;
  ct.style.top=`calc(var(--safe-top) + ${hh}px)`;
  fw.style.top=`calc(var(--safe-top) + ${hh+cth}px)`;
  fw.style.bottom=`calc(var(--tab-h) + var(--safe-bot))`;
}

/* ── MARKETS ── */
function setM(id,val,chg){
  const v=document.getElementById('v-'+id);
  const c=document.getElementById('c-'+id);
  if(v)v.textContent=val;
  if(c){c.textContent=chg;c.className='mc '+(chg.startsWith('-')?'dn':'up');}
}
async function fetchMarkets(){
  try{
    const r=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:700,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      system:'Search current market prices. Return ONLY JSON no markdown: {"dow":{"val":"43521","chg":"+0.4%"},"sp":{"val":"5891","chg":"+0.3%"},"nasdaq":{"val":"18234","chg":"+0.6%"},"ftse":{"val":"8445","chg":"-0.1%"},"gold":{"val":"2654","chg":"+0.8%"},"oil":{"val":"72.3","chg":"-0.5%"},"btc":{"val":"84200","chg":"+1.2%"},"eur":{"val":"1.085","chg":"+0.1%"}}',
      messages:[{role:'user',content:'Current market prices JSON only.'}]
    })});
    const d=await r.json();
    const txt=d.content.filter(b=>b.type==='text').map(b=>b.text).join('').replace(/```json|```/g,'').trim();
    const m=JSON.parse(txt);
    setM('dow',m.dow.val,m.dow.chg);setM('sp',m.sp.val,m.sp.chg);
    setM('nq',m.nasdaq.val,m.nasdaq.chg);setM('ftse',m.ftse.val,m.ftse.chg);
    setM('gold','$'+m.gold.val,m.gold.chg);setM('oil','$'+m.oil.val,m.oil.chg);
    setM('btc','$'+m.btc.val,m.btc.chg);setM('eur',m.eur.val,m.eur.chg);
    if(curTab==='markets')renderMarkets();
  }catch(e){console.error('Mkt',e);}
}

/* ── NEWS ── */
async function fetchCat(cat){
  const info=CATS.find(c=>c.id===cat);
  const r=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    model:'claude-sonnet-4-20250514',max_tokens:1300,
    tools:[{type:'web_search_20250305',name:'web_search'}],
    system:`You are a senior editor at a world-class financial news platform. Search the web for the latest ${info.label} news RIGHT NOW. Return ONLY a valid JSON array of exactly 4 objects, no markdown, no backticks, no explanation. Each: {"headline":"powerful specific headline max 12 words","summary":"2-3 sentence editorial summary in fresh original prose in the style of the Financial Times","source":"publication name","category":"${cat}","urgency":"breaking|developing|analysis"}. Use real current news. Be specific with names, numbers, facts.`,
    messages:[{role:'user',content:`4 most important ${info.label} stories right now, JSON only.`}]
  })});
  const d=await r.json();
  const txt=d.content.filter(b=>b.type==='text').map(b=>b.text).join('').replace(/```json|```/g,'').trim();
  const s=txt.indexOf('['),e=txt.lastIndexOf(']');
  if(s<0||e<0)throw new Error('No array');
  return JSON.parse(txt.slice(s,e+1));
}

/* ── CHIP ── */
function chip(u){return `<div class="chip chip-${u[0]}">${u}</div>`;}

/* ── RENDER FEED ── */
function renderFeed(){
  if(curTab!=='feed')return;
  const cats=curCat==='all'?CATS:CATS.filter(c=>c.id===curCat);
  let h='';

  // Breaking banner
  let brk=null;
  for(const cat of cats){if(!brk&&news[cat.id]){brk=news[cat.id].find(s=>s.urgency==='breaking');if(brk)break;}}
  if(brk){
    const cat=CATS.find(c=>c.id===brk.category);
    h+=`<div class="brk" onclick="openStory(${esc(brk)})"><div class="brk-tag">Breaking</div><div class="brk-txt">${brk.headline}</div></div>`;
  }

  // Hero
  let hero=null,herocat=null;
  for(const cat of cats){if(!hero&&news[cat.id]&&news[cat.id].length){hero=news[cat.id][0];herocat=cat;break;}}
  if(hero){
    h+=`<div class="hero" onclick="openStory(${esc(hero)})">
      <div class="hero-img-box"><div class="hero-img-txt">EC</div><div class="hero-img-grad"></div></div>
      <div class="hero-body">
        <div class="hero-kicker" style="color:${herocat.color}">${herocat.label} · ${hero.urgency.toUpperCase()}</div>
        <div class="hero-hl">${hero.headline}</div>
        <div class="hero-sum">${hero.summary}</div>
        <div class="hero-ft"><div class="hero-src">${hero.source}</div>${chip(hero.urgency)}</div>
      </div></div>`;
  }else{
    h+=`<div class="hero"><div class="hero-body"><div class="sk sk1"></div><div class="sk sk2"></div><div class="sk sk3"></div><div class="sk sk4"></div></div></div>`;
  }

  // Horizontal scroll (second category)
  if(curCat==='all'&&cats.length>1){
    const c2=cats[1];const s2=news[c2.id]||[];
    if(s2.length){
      h+=`<div class="section-row"><div class="section-ttl">${c2.label}</div></div>`;
      h+=`<div class="hscroll">`;
      s2.forEach(s=>{h+=`<div class="hc" onclick="openStory(${esc(s)})"><div class="hc-cat" style="color:${c2.color}">${s.urgency.toUpperCase()}</div><div class="hc-hl">${s.headline}</div><div class="hc-src">${s.source}</div></div>`;});
      h+=`</div>`;
    }
  }

  // List sections
  const sl=curCat==='all'?cats.slice(2):cats;
  sl.forEach(cat=>{
    const st=news[cat.id]||[];if(!st.length)return;
    h+=`<div class="section-row"><div class="section-ttl">${cat.label}</div><div class="section-cnt">${st.length} stories</div></div>`;
    h+=`<div class="story-list">`;
    (curCat==='all'?st.slice(0,3):st).forEach(s=>{
      h+=`<div class="sc ${cat.id}" onclick="openStory(${esc(s)})">
        <div class="sc-top"><div class="sc-hl">${s.headline}</div>${chip(s.urgency)}</div>
        <div class="sc-sum">${s.summary}</div>
        <div class="sc-ft"><div class="sc-dot" style="background:${cat.color}"></div><div class="sc-src">${s.source}</div><div class="sc-ago">Just now</div></div>
      </div>`;
    });
    h+=`</div>`;
  });

  h+=`<div class="feed-footer"><div class="ff-txt">Auto-refresh in</div><div class="ff-time" id="ff-cd">—</div></div>`;
  document.getElementById('feed').innerHTML=h;
}

function esc(s){return JSON.stringify(s).replace(/"/g,'&quot;');}

/* ── OPEN STORY ── */
function openStory(s){
  const cat=CATS.find(c=>c.id===s.category)||{color:'#c9a84c',label:s.category};
  const overlay=document.createElement('div');overlay.className='sheet-overlay';
  const box=document.createElement('div');box.className='sheet-box';
  box.innerHTML=`<div class="sheet-handle"></div>
    <div class="sheet-body">
      <div class="sheet-kicker" style="color:${cat.color}">${cat.label} · ${s.urgency.toUpperCase()}</div>
      <div class="sheet-hl">${s.headline}</div>
      <div class="sheet-sum">${s.summary}</div>
      <div class="sheet-src">Source: ${s.source} · EconomyConsumer.com</div>
      <div class="sheet-btns">
        <div class="sheet-btn sbtn-save" id="save-btn">Save Article</div>
        <div class="sheet-btn sbtn-close" onclick="closeSheet()">Close</div>
      </div>
    </div>`;
  document.body.appendChild(overlay);document.body.appendChild(box);
  requestAnimationFrame(()=>box.classList.add('open'));
  overlay.onclick=closeSheet;
  box.querySelector('#save-btn').onclick=()=>{
    if(!saved.find(a=>a.headline===s.headline)){saved.push(s);localStorage.setItem('ec_saved',JSON.stringify(saved));}
    box.querySelector('#save-btn').textContent='Saved ✓';
    showToast('Article saved to bookmarks');
  };
  window._closeSheet=()=>{box.classList.remove('open');setTimeout(()=>{overlay.remove();box.remove();},350);};
}
function closeSheet(){if(window._closeSheet)window._closeSheet();}

/* ── TABS ── */
function switchTab(t){
  curTab=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  const ct=document.getElementById('ctabs');
  ct.style.display=t==='feed'?'flex':'none';
  layout();
  if(t==='feed')renderFeed();
  else if(t==='markets')renderMarkets();
  else if(t==='search')renderSearch();
  else if(t==='saved')renderSaved();
  document.getElementById('feed-wrap').scrollTo(0,0);
}

/* ── MARKETS TAB ── */
function renderMarkets(){
  if(curTab!=='markets')return;
  const ids=['dow','sp','nq','ftse','gold','oil','btc','eur'];
  const names=['Dow Jones','S&P 500','NASDAQ','FTSE 100','Gold','Oil WTI','Bitcoin','EUR/USD'];
  let h=`<div class="section-row" style="padding-top:16px"><div class="section-ttl">Market Data</div></div>`;
  h+=`<div class="mkt-grid">`;
  ids.forEach((id,i)=>{
    const v=document.getElementById('v-'+id)?.textContent||'—';
    const c=document.getElementById('c-'+id)?.textContent||'—';
    h+=`<div class="mg-card"><div class="mg-name">${names[i]}</div><div class="mg-val">${v}</div><div class="mg-chg ${c.startsWith('-')?'dn':'up'}">${c}</div></div>`;
  });
  h+=`</div>`;
  const ms=news['markets']||[];
  if(ms.length){
    h+=`<div class="section-row"><div class="section-ttl">Market News</div></div>`;
    h+=`<div class="story-list">`;
    ms.forEach(s=>{
      const cat=CATS.find(c=>c.id==='markets');
      h+=`<div class="sc markets" onclick="openStory(${esc(s)})"><div class="sc-top"><div class="sc-hl">${s.headline}</div>${chip(s.urgency)}</div><div class="sc-sum">${s.summary}</div><div class="sc-ft"><div class="sc-dot" style="background:${cat.color}"></div><div class="sc-src">${s.source}</div></div></div>`;
    });
    h+=`</div>`;
  }
  document.getElementById('feed').innerHTML=h;
}

/* ── SEARCH TAB ── */
function renderSearch(){
  document.getElementById('feed').innerHTML=`
    <div class="search-box"><div class="search-ico">🔍</div><input id="sinput" placeholder="Search articles..." oninput="doSearch(this.value)"></div>
    <div id="sres"></div>`;
  setTimeout(()=>document.getElementById('sinput')?.focus(),100);
}
function doSearch(q){
  const res=document.getElementById('sres');if(!res)return;
  if(!q.trim()){res.innerHTML='';return;}
  const all=Object.values(news).flat();
  const m=all.filter(s=>s.headline.toLowerCase().includes(q.toLowerCase())||s.summary.toLowerCase().includes(q.toLowerCase()));
  if(!m.length){res.innerHTML=`<div class="empty-state"><div class="ei">🔍</div><div class="et">No results for "${q}"</div></div>`;return;}
  let h=`<div class="story-list" style="margin-top:4px">`;
  m.forEach(s=>{const cat=CATS.find(c=>c.id===s.category)||{id:s.category,color:'#c9a84c'};
    h+=`<div class="sc ${cat.id}" onclick="openStory(${esc(s)})"><div class="sc-top"><div class="sc-hl">${s.headline}</div>${chip(s.urgency)}</div><div class="sc-sum">${s.summary}</div><div class="sc-ft"><div class="sc-dot" style="background:${cat.color}"></div><div class="sc-src">${s.source}</div></div></div>`;
  });
  h+=`</div>`;res.innerHTML=h;
}

/* ── SAVED TAB ── */
function renderSaved(){
  let h=`<div class="section-row" style="padding-top:16px"><div class="section-ttl">Saved Articles</div></div>`;
  if(!saved.length){h+=`<div class="empty-state"><div class="ei">🔖</div><div class="et">No saved articles yet</div></div>`;}
  else{
    h+=`<div class="story-list">`;
    [...saved].reverse().forEach(s=>{const cat=CATS.find(c=>c.id===s.category)||{id:s.category,color:'#c9a84c'};
      h+=`<div class="sc ${cat.id}" onclick="openStory(${esc(s)})"><div class="sc-top"><div class="sc-hl">${s.headline}</div>${chip(s.urgency)}</div><div class="sc-sum">${s.summary}</div><div class="sc-ft"><div class="sc-dot" style="background:${cat.color}"></div><div class="sc-src">${s.source}</div></div></div>`;
    });
    h+=`</div>`;
  }
  document.getElementById('feed').innerHTML=h;
}

/* ── TOAST ── */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

/* ── PULL TO REFRESH ── */
let ptY=0,ptOn=false;
const fw=document.getElementById('feed-wrap');
fw.addEventListener('touchstart',e=>{if(fw.scrollTop===0)ptY=e.touches[0].clientY;},{passive:true});
fw.addEventListener('touchmove',e=>{if(ptY&&fw.scrollTop===0&&e.touches[0].clientY-ptY>70&&!ptOn){ptOn=true;}},{passive:true});
fw.addEventListener('touchend',()=>{if(ptOn){ptOn=false;ptY=0;doRefresh();}},{passive:true});

/* ── COUNTDOWN ── */
function startCountdown(){
  clearInterval(cdTimer);cdSecs=3600;
  cdTimer=setInterval(()=>{
    cdSecs--;
    if(cdSecs<=0){clearInterval(cdTimer);loadAll();return;}
    const m=String(Math.floor(cdSecs/60)).padStart(2,'0');
    const s=String(cdSecs%60).padStart(2,'0');
    const el=document.getElementById('ff-cd');
    if(el)el.textContent=`${m}:${s}`;
  },1000);
}

/* ── REFRESH ── */
function doRefresh(){showToast('Refreshing all news...');loadAll();}

/* ── LOAD ALL ── */
async function loadAll(){
  const loader=document.getElementById('loader');
  loader.classList.remove('gone');
  const fill=document.getElementById('lfill');
  const status=document.getElementById('lst');
  const rbtn=document.getElementById('rbtn');
  rbtn.classList.add('spinning');
  news={};

  // Test proxy first
  try{
    status.textContent='Connecting to AI...';
    const test=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:10,messages:[{role:'user',content:'hi'}]})});
    if(!test.ok){
      const err=await test.json();
      status.textContent='Error: '+(err.error||'API connection failed');
      fill.style.width='100%';
      rbtn.classList.remove('spinning');
      setTimeout(()=>{loader.classList.add('gone');layout();},3000);
      return;
    }
  }catch(e){
    status.textContent='Cannot reach server. Check Vercel logs.';
    fill.style.width='100%';
    rbtn.classList.remove('spinning');
    setTimeout(()=>{loader.classList.add('gone');layout();},3000);
    return;
  }

  fetchMarkets();
  let done=0;
  for(const cat of CATS){
    status.textContent=`Scanning: ${cat.label}...`;
    fill.style.width=`${(done/CATS.length)*90}%`;
    try{
      const s=await fetchCat(cat.id);
      news[cat.id]=s;
      if(curTab==='feed')renderFeed();
    }catch(e){
      console.error(cat.id,e);
      news[cat.id]=[];
    }
    done++;
  }
  fill.style.width='100%';
  const total=Object.values(news).flat().length;
  status.textContent=total>0?`${total} stories loaded.`:'No stories loaded — check Vercel env vars.';
  rbtn.classList.remove('spinning');
  setTimeout(()=>{loader.classList.add('gone');layout();},800);
  startCountdown();
}

/* ── CAT TABS ── */
document.getElementById('ctabs').addEventListener('click',e=>{
  const t=e.target.closest('.ct');if(!t)return;
  curCat=t.dataset.c;
  document.querySelectorAll('.ct').forEach(c=>c.classList.toggle('on',c===t));
  renderFeed();
  fw.scrollTo({top:0,behavior:'smooth'});
});

/* ── INIT ── */
window.addEventListener('load',()=>{layout();loadAll();});
window.addEventListener('resize',layout);
</script>
